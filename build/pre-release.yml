trigger:
  branches:
    include:
      - main
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: microsoft/vscode-engineering
      ref: main
      endpoint: Monaco

extends:
  template: azure-pipelines/extension/pre-release.yml@templates
  parameters:
    l10nSourcePaths: ./src
    buildSteps:
      - script: npm i
        displayName: Install Dependencies

      - script: npm run bundle
        displayName: Bundle for Production

      - script: >
          node ./scripts/prepare-pre-release.js
        displayName: Generate package.json

      - script: |
          mv ./package.json ./package.json.bak
          mv ./package.insiders.json ./package.json
        displayName: Override package.json

    tsa:
      config:
        areaPath: "Visual Studio Code Miscellaneous Extensions"
      enabled: true

    publishExtension: true
